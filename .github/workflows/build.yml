name: Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
          cache-dependency-path: |
            android/**/*.gradle*
            android/gradle/wrapper/gradle-wrapper.properties

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "tools platform-tools platforms;android-36 build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android project
        run: npm run android:sync

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Prepare APK artifact
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/nimeplay-android-tv-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: nimeplay-android-tv-debug-apk
          path: artifacts/nimeplay-android-tv-debug.apk
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
